    font-size="18"
    font-weight="600"
    letter-spacing="3"
  >
    DATA ENGINEERING &amp; AI SOLUTIONS
  </text>

  <text
    x="92"
    y="352"
    fill="#f5f5f5"
    font-family="Inter, 'Segoe UI', Arial, sans-serif"
    font-size="92"
    font-weight="800"
    letter-spacing="-5"
  >
    RELIABLE DATA.
  </text>

  <text
    x="92"
    y="452"
    fill="#f5f5f5"
    font-family="Inter, 'Segoe UI', Arial, sans-serif"
