<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">JC monogram logo</title>
  <desc id="logoDesc">Circular monogram with the letters J and C.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ba5a1d" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#ba5a1d" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcfac" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ba5a1d" stop-opacity="0.55" />
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="url(#stroke)" stroke-width="2" />
  <text
    x="60"
    y="69"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Segoe UI', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="1"
    fill="#fff3ea"
  >
    JC
  </text>
</svg>
